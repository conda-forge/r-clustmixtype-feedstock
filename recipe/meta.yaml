{% set version = "0.5-2" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-clustmixtype
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/clustMixType_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/clustMixType/clustMixType_{{ version }}.tar.gz
  sha256: f46d8d2c04ec3445588bd8103eb7f80a8b7330a3500ddda1a0a6afca2cbceeb0

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rcolorbrewer
    - r-cluster
    - r-combinat
    - r-dplyr
    - r-mclust
    - r-rlang
    - r-tibble
  run:
    - r-base
    - r-rcolorbrewer
    - r-cluster
    - r-combinat
    - r-dplyr
    - r-mclust
    - r-rlang
    - r-tibble

test:
  commands:
    - $R -e "library('clustMixType')"           # [not win]
    - "\"%R%\" -e \"library('clustMixType')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=clustMixType
  license: GPL-2.0-or-later
  summary: "Functions to perform k-prototypes partitioning clustering for mixed variable-type data according to Z.Huang (1998): Extensions to the k-Means Algorithm for Clustering Large Data Sets with Categorical Variables, Data Mining and Knowledge Discovery 2, 283-304 and G.Szepannek et al. (2025): Clustering Large Mixed-Type
    Data with Ordinal Variables, Adv Data Anal Classif 19, 749–767."
  license_family: GPL2
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r

